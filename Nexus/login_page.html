<body>
    

    <div id="app">
        <!-- Flash Message Blade Component -->
        <v-flash-group ref='flashes'></v-flash-group>


        

        <!-- Page Content Blade Component -->
        <!-- Page Title -->
     
    <div class="flex h-[100vh] flex-col items-center justify-center gap-10">
        <div class="flex flex-col items-center gap-5">
            <!-- Logo -->
                            <img
                    class="w-max"
                    src="http://billing.nexus.htb/admin/build/assets/logo-Bjh7YAuF.svg"
                    alt="Krayin CRM"
                />
            
            <div class="box-shadow flex min-w-[300px] flex-col rounded-md bg-white dark:bg-gray-900">
                

                <!-- Login Form -->
                <!--
    If a component has the `as` attribute, it indicates that it uses
    the ajaxified form or some customized slot form.
-->
    
    
    <v-form
        method="POST"
        :initial-errors="[]"
        v-slot="{ meta, errors, setValues }"
        @invalid-submit="onInvalidSubmit"
        action="http://billing.nexus.htb/admin/login"
    >
                    <input type="hidden" name="_token" value="CGv3xENV7KTwqBjE5YLm5iaOWpwiPmUWUaZLZtRV" autocomplete="off">        
        
        <p class="p-4 text-xl font-bold text-gray-800 dark:text-white">
                        Sign In                    </p>

                    <div class="border-y p-4 dark:border-gray-800">
                        <!-- Email -->
                        <div class="mb-4">
    <label class="mb-1.5 flex items-center gap-1 text-sm font-normal text-gray-800 dark:text-white required">
    Email Address
</label>

                            <v-field
            v-slot="{ field, errors }"
            rules="required|email" label="Email Address"
            name="email"
        >
            <input
                type="email"
                name="email"
                v-bind="field"
                :class="[errors.length ? 'border !border-red-600 hover:border-red-600' : '']"
                class="w-full rounded border border-gray-200 px-2.5 py-2 text-sm font-normal text-gray-800 transition-all hover:border-gray-400 focus:border-gray-400 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-300 dark:hover:border-gray-400 dark:focus:border-gray-400 w-[254px] max-w-full" id="email" placeholder="Email Address"
            />
        </v-field>

        

                            <v-error-message
    
    name="email"
    v-slot="{ message }"
>
    <p
        class="mt-1 text-xs italic text-red-600"
        v-text="message"
    >
    </p>
</v-error-message>
</div>

                        <!-- Password -->
                        <div class="mb-4 relative w-full">
    <label class="mb-1.5 flex items-center gap-1 text-sm font-normal text-gray-800 dark:text-white required">
    Password
</label>

                            <v-field
            v-slot="{ field, errors }"
            rules="required|min:6" label="Password"
            name="password"
        >
            <input
                type="password"
                name="password"

    <script type="module">
        app.component('v-flash-item', {
            template: '#v-flash-item-template',

            props: ['flash'],

            data() {
                return {
                    iconClasses: {
                        success: 'icon-success',

                        error: 'icon-error',

                        warning: 'icon-warning',

                        info: 'icon-info',
                    },

                    typeHeadings: {
                        success: "Success",

                        error: "Error",

                        warning: "Warning",

                        info: "Info",
                    },

                    typeStyles: {
                        success: {
                            container: 'border-left: 8px solid #16A34A',

                            icon: 'color: #16A34A',

                            stroke: '#16A34A',
                        },

                        error: {
                            container: 'border-left: 8px solid #FF4D50',

                            icon: 'color: #FF4D50',

                            stroke: '#FF4D50',
                        },

                        warning: {
                            container: 'border-left: 8px solid #FBAD15',

                            icon: 'color: #FBAD15',

                            stroke: '#FBAD15',
                        },

                        info: {
                            container: 'border-left: 8px solid #0E90D9',

                            icon: 'color: #0E90D9',

                            stroke: '#0E90D9',
                        },
                    },

                    duration: 5000,

                    progress: 0,
                    
                    circumference: 2 * Math.PI * 10,

                    timer: null,

                    isPaused: false,
                    
                    remainingTime: 5000,
                };
            },

            computed: {
                strokeDashoffset() {
                    return this.circumference - (this.progress / 100) * this.circumference;
                }
            },

            created() {
                this.startTimer();
            },

            beforeUnmount() {
                this.stopTimer();
            },

            methods: {
                remove() {
                    this.$emit('onRemove', this.flash)
                },

                startTimer() {
                    const interval = 100;
                    
                    const step = (100 / (this.duration / interval));

                    this.timer = setInterval(() => {
                        if (! this.isPaused) {
                            this.progress += step;

                            this.remainingTime -= interval;

                            if (this.progress >= 100) {
                                this.stopTimer();
                                this.remove();
                            }
                        }
                    }, interval);
                },

                stopTimer() {
                    clearInterval(this.timer);
                },

                pauseTimer() {
                    this.isPaused = true;
                },

                resumeTimer() {
                    this.isPaused = false;
                },
            }
        });
    </script>

    <script type="module">
        app.component('v-flash-group', {
            template: '#v-flash-group-template',

            data() {
                return {
                    uid: 0,

                    flashes: []
                }
            },

            created() {
                                                                                                                                                                
                this.registerGlobalEvents();
            },

            methods: {
                add(flash) {
                    flash.uid = this.uid++;

                    this.flashes.push(flash);
                },

                remove(flash) {
                    let index = this.flashes.indexOf(flash);

                    this.flashes.splice(index, 1);
                },

                registerGlobalEvents() {
                    this.$emitter.on('add-flash', this.add);
                },
            }
        });
    </script>
